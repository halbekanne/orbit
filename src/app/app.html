@if (!settingsService.loaded()) {
} @else if (!settingsService.isConfigured() && routerSync.activeView() !== 'einstellungen') {
  <app-welcome-screen (configure)="onWelcomeConfigure()" />
} @else {
  @if (settingsService.pomodoroEnabled()) {
    <app-pomodoro-progress-bar />
  }
  <div class="flex h-screen overflow-hidden">
    <app-rail
      [activeView]="routerSync.activeView()"
      (viewChange)="onViewChange($event)"
    />

    <router-outlet />
  </div>
  <app-quick-capture [open]="overlayOpen()" (close)="onOverlayClose()" />
  @if (settingsService.pomodoroEnabled()) {
    <app-pomodoro-overlay />
  }
}
